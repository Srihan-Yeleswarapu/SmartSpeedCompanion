name: SmartSpeedCompanion
options:
  bundleIdPrefix: com.smartspeedcompanion
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.2"
  generateEmptyDirectories: true

packages:
  firebase-ios-sdk:
    url: https://github.com/firebase/firebase-ios-sdk
    from: "10.29.0"

targets:
  SmartSpeedCompanion:
    type: application
    platform: iOS
    deploymentTarget: "17.0"

    sources:
      - path: SmartSpeedCompanion
        excludes:
          - "Features/iOS26/Widgets/**"
          - "Features/iOS26/LiveActivities/**"

    resources:
      - path: SmartSpeedCompanion/Resources/Entitlements/SmartSpeedCompanion.entitlements
      - path: SmartSpeedCompanion/Configuration/Info.plist
      - path: SmartSpeedCompanion/GoogleService-Info.plist

    dependencies:
      - package: firebase-ios-sdk
        product: FirebaseDatabase

    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.smartspeedcompanion.app
        SWIFT_VERSION: "5.9"
        TARGETED_DEVICE_FAMILY: "1,2"
        IPHONEOS_DEPLOYMENT_TARGET: "17.0"
        INFOPLIST_FILE: SmartSpeedCompanion/Configuration/Info.plist
        CODE_SIGN_ENTITLEMENTS: SmartSpeedCompanion/Resources/Entitlements/SmartSpeedCompanion.entitlements
        ENABLE_BITCODE: NO
        DEBUG_INFORMATION_FORMAT: dwarf-with-dsym
      configs:
        Release:
          SWIFT_OPTIMIZATION_LEVEL: "-O"
        Debug:
          SWIFT_OPTIMIZATION_LEVEL: "-Onone"