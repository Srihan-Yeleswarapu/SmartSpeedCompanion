name: SmartSpeedCompanion
options:
  bundleIdPrefix: com.smartspeedcompanion
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "15.0"
  createIntermediateGroups: true
  groupSortPosition: top

settings:
  base:
    SWIFT_VERSION: "5.9"
    DEVELOPMENT_TEAM: ""
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"
    ENABLE_BITCODE: NO
    DEBUG_INFORMATION_FORMAT: dwarf-with-dsym

targets:

  # ── Main iPhone App ──────────────────────────────────────────────
  SmartSpeedCompanion:
    type: application
    platform: iOS
    deploymentTarget: "17.0"

    # Points to where files ACTUALLY are (confirmed by Gemini audit)
    sources:
      - path: SmartSpeedCompanion/App
      - path: SmartSpeedCompanion/CarPlay
      - path: SmartSpeedCompanion/Core
      - path: SmartSpeedCompanion/Extensions
      - path: SmartSpeedCompanion/Models
      - path: SmartSpeedCompanion/ViewModels
      - path: SmartSpeedCompanion/Views
      - path: SmartSpeedCompanion/Features/iOS26/CrashDetection
      - path: SmartSpeedCompanion/Features/iOS26/LiveActivities
      - path: SmartSpeedCompanion/Features/iOS26/Siri
      - path: SmartSpeedCompanion/Features/iOS26/StandBy

    resources:
      - path: SmartSpeedCompanion/Resources

    # Fixed: now points to where entitlements ACTUALLY is
    entitlements:
      path: SmartSpeedCompanion/Resources/Entitlements/SmartSpeedCompanion.entitlements

    info:
      path: SmartSpeedCompanion/Configuration/Info.plist
      properties:
        CFBundleName: Smart Speed
        CFBundleDisplayName: Smart Speed Companion
        CFBundleIdentifier: com.smartspeedcompanion.app
        CFBundleVersion: "1"
        CFBundleShortVersionString: "1.0.0"
        UILaunchScreen:
          UIColorName: LaunchBackground
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: true
          UISceneConfigurations:
            UIWindowSceneSessionRoleApplication:
              - UISceneConfigurationName: Default Configuration
                UISceneDelegateClassName: $(PRODUCT_MODULE_NAME).SceneDelegate
            CPTemplateApplicationSceneSessionRoleApplication:
              - UISceneConfigurationName: CarPlay Configuration
                UISceneDelegateClassName: $(PRODUCT_MODULE_NAME).CarPlaySceneDelegate
        UIBackgroundModes:
          - location
          - audio
          - fetch
          - remote-notification
        NSLocationAlwaysAndWhenInUseUsageDescription: "Smart Speed Companion needs your location to monitor your speed in real time."
        NSLocationWhenInUseUsageDescription: "Smart Speed Companion needs your location to monitor your speed."
        NSMotionUsageDescription: "Used to detect sudden deceleration for crash detection."
        NSSiriUsageDescription: "Use Siri to start and stop your drive sessions."
        CPSupportedTemplates:
          - CPMapTemplate
          - CPAlertTemplate
        UIRequiredDeviceCapabilities:
          - location-services
          - gps

    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.smartspeedcompanion.app
        INFOPLIST_FILE: SmartSpeedCompanion/Configuration/Info.plist
        CODE_SIGN_ENTITLEMENTS: SmartSpeedCompanion/Resources/Entitlements/SmartSpeedCompanion.entitlements
        LD_RUNPATH_SEARCH_PATHS: "$(inherited) @executable_path/Frameworks"

    dependencies:
      - target: SpeedWidget
      - target: SpeedLiveActivity

  # ── WidgetKit Extension ──────────────────────────────────────────
  # Fixed: points to actual location inside Features/iOS26/Widgets
  SpeedWidget:
    type: app-extension
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: SmartSpeedCompanion/Features/iOS26/Widgets
    info:
      path: SmartSpeedCompanion/Features/iOS26/Widgets/SpeedWidget-Info.plist
      properties:
        CFBundleIdentifier: com.smartspeedcompanion.app.widget
        CFBundleDisplayName: Speed Widget
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.smartspeedcompanion.app.widget

  # ── Live Activity Extension ──────────────────────────────────────
  # Fixed: points to actual location inside Features/iOS26/LiveActivities
  SpeedLiveActivity:
    type: app-extension
    platform: iOS
    deploymentTarget: "16.1"
    sources:
      - path: SmartSpeedCompanion/Features/iOS26/LiveActivities
    info:
      path: SmartSpeedCompanion/Features/iOS26/LiveActivities/LiveActivity-Info.plist
      properties:
        CFBundleIdentifier: com.smartspeedcompanion.app.liveactivity
        CFBundleDisplayName: Speed Live Activity
        NSExtension:
          NSExtensionPointIdentifier: com.apple.usernotifications.content-extension
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.smartspeedcompanion.app.liveactivity

schemes:
  SmartSpeedCompanion:
    build:
      targets:
        SmartSpeedCompanion: all
        SpeedWidget: all
        SpeedLiveActivity: all
    run:
      config: Debug
    archive:
      config: Release
