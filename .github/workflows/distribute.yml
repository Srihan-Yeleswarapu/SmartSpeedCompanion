name: 🚀 Speedio Release (Signed)

on:
  push:
    branches: [ version2 ]
  workflow_dispatch:

jobs:
  distribute:
    name: Build and Release Signed IPA
    runs-on: macos-14
    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Find and select latest Xcode
        run: |
          XCODE_PATH=$(ls -d /Applications/Xcode_*.app 2>/dev/null | sort -V | tail -1)
          echo "Selecting: $XCODE_PATH"
          sudo xcode-select -s "$XCODE_PATH/Contents/Developer"
          xcodebuild -version

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Setup Apple Certificate and Provisioning Profile
        env:
          KEYCHAIN_PASSWORD: "build_keychain_pass"
          PP_BASE64: ${{ secrets.APPSTORE_PROVISIONING_PROFILE_BASE64 }}
        run: |
          # Verify required signing assets exist in the repository
          if [ ! -f SmartSpeedCompanion/distribution.cer ]; then
            echo "❌ distribution.cer not found in repository"
            exit 1
          fi
          if [ ! -f SmartSpeedCompanion/SmartSpeedCompanion.key ]; then
            echo "❌ SmartSpeedCompanion.key not found in repository"
            exit 1
          fi

          # Paths for temporary files and keychain
          CERT_PATH=$RUNNER_TEMP/build_certificate.p12
          PP_DIR=~/Library/MobileDevice/Provisioning\ Profiles
          mkdir -p "$PP_DIR"
          PP_PATH="$PP_DIR/Speedio.mobileprovision"
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db

          # Debug: list repository signing assets
          echo "🔎 Repository signing assets:" ; ls -lah SmartSpeedCompanion

          # Generate a temporary PKCS#12 bundle from the cert and key
          echo "🔧 Generating temporary P12 using OpenSSL..."
          openssl pkcs12 -export \
            -inkey SmartSpeedCompanion/SmartSpeedCompanion.key \
            -in SmartSpeedCompanion/distribution.cer \
            -inform DER \
            -out "$CERT_PATH" \
            -passout pass:speedio123

          # Fail fast if the generated P12 is missing or empty
          if [ ! -s "$CERT_PATH" ]; then
            echo "❌ Generated P12 is empty. Generation failed."
            exit 1
          fi

          # Debug: size and SHA‑256 hash of the generated P12
          echo "🔎 Generated P12 size (bytes): $(stat -f %z \"$CERT_PATH\")"
          echo "🔎 Generated P12 SHA256: $(shasum -a 256 \"$CERT_PATH\" | awk '{print $1}')"

          # Inspect the generated P12 (no private keys) for verification
          echo "🔍 Inspecting generated P12..."
          openssl pkcs12 -info -in "$CERT_PATH" -nokeys -passin pass:speedio123 || {
            echo "❌ OpenSSL inspection of generated P12 failed"
            exit 1
          }

          # Decode provisioning profile (strip whitespace for macOS compatibility)
          echo "$PP_BASE64" | tr -d '[:space:]' | base64 -D > "$PP_PATH"
          if [ ! -s "$PP_PATH" ]; then
            echo "❌ Decoded provisioning profile is empty. Verify APPSTORE_PROVISIONING_PROFILE_BASE64 secret."
            exit 1
          fi
          echo "🔎 Provisioning profile size (bytes): $(stat -f %z \"$PP_PATH\")"
          echo "🔎 Provisioning profile SHA256: $(shasum -a 256 \"$PP_PATH\" | awk '{print $1}')"

          # 2. Setup Keychain with a non‑empty password
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          # 3. Import generated P12 into Keychain
          security import "$CERT_PATH" -k "$KEYCHAIN_PATH" -P "speedio123" -T /usr/bin/codesign -T /usr/bin/security
          security list-keychains -d user -s "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          # Verify that a signing identity is now present
          echo "🔎 Verifying signing identities in the keychain:"
          security find-identity -v -p codesigning "$KEYCHAIN_PATH" || {
            echo "❌ No signing identity found after import"
            exit 1
          }

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Build App Store Archive (Signed)
        run: |
          xcodebuild \
            -project SmartSpeedCompanion.xcodeproj \
            -scheme SmartSpeedCompanion \
            -configuration Release \
            -destination "generic/platform=iOS" \
            -archivePath ./SmartSpeedCompanion.xcarchive \
            clean archive

      - name: Create Export Options Plist
        run: |
          cat > exportOptions.plist << 'EOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>method</key>
              <string>app-store</string>
              <key>signingStyle</key>
              <string>manual</string>
              <key>provisioningProfileSpecifier</key>
              <string>Speedio App Store</string>
              <key>stripSwiftSymbols</key>
              <true/>
              <key>teamID</key>
              <string>VCNBBG32P6</string>
              <key>uploadSymbols</key>
              <true/>
          </dict>
          </plist>
          EOF

      - name: Export Signed Production IPA
        run: |
          xcodebuild \
            -exportArchive \
            -archivePath ./SmartSpeedCompanion.xcarchive \
            -exportOptionsPlist exportOptions.plist \
            -exportPath ./Export

      - name: Upload to App Store Connect
        run: |
          xcrun altool \
            --upload-app \
            --file "./Export/SmartSpeedCompanion.ipa" \
            --type ios \
            --username "${{ secrets.APPSTORE_CONNECT_USERNAME }}" \
            --password "${{ secrets.APPSTORE_CONNECT_PASSWORD }}" \
            --show-progress

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Speedio-Distribution-${{ github.run_number }}
          path: |
            Export/*.ipa
            SmartSpeedCompanion.xcarchive
          retention-days: 7
