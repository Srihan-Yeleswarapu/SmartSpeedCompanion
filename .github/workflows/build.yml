name: Build & Sign SmartSpeedCompanion

# Runs on every push to main branch
# Also runs manually via GitHub Actions UI (workflow_dispatch)
on:
  push:
    branches: [ main ]
  workflow_dispatch:  # lets you trigger a build manually with one click

jobs:
  build:
    name: Build, Sign & Export IPA
    runs-on: macos-14          # Xcode 15 is pre-installed on macos-14 runners
    timeout-minutes: 60

    steps:

    # ── 1. Download your code ──────────────────────────────────────
    - name: Checkout repository
      uses: actions/checkout@v4

    # ── 2. Pick the right Xcode version ───────────────────────────
    - name: Select Xcode 15
      run: sudo xcode-select -s /Applications/Xcode_15.4.app/Contents/Developer

    # ── 3. Install XcodeGen (generates .xcodeproj from project.yml) ─
    - name: Install XcodeGen
      run: brew install xcodegen

    # ── 4. Generate the Xcode project ─────────────────────────────
    - name: Generate Xcode project
      run: xcodegen generate

    # ── 5. Install your signing certificate ───────────────────────
    #    (The .p12 file and password live in GitHub Secrets — never in code)
    - name: Install Apple certificate
      env:
        P12_BASE64: ${{ secrets.APPLE_P12_BASE64 }}
        P12_PASSWORD: ${{ secrets.APPLE_P12_PASSWORD }}
        KEYCHAIN_PASSWORD: temporarybuildkeychain
      run: |
        # Create a temporary keychain just for this build
        security create-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
        security default-keychain -s build.keychain
        security unlock-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
        security set-keychain-settings -t 3600 -l build.keychain

        # Decode and import the certificate
        echo "$P12_BASE64" | base64 --decode > certificate.p12
        security import certificate.p12 \
          -k build.keychain \
          -P "$P12_PASSWORD" \
          -T /usr/bin/codesign
        security set-key-partition-list \
          -S apple-tool:,apple: \
          -s -k "$KEYCHAIN_PASSWORD" build.keychain

    # ── 6. Install your provisioning profile ──────────────────────
    - name: Install provisioning profile
      env:
        PROFILE_BASE64: ${{ secrets.PROVISIONING_PROFILE_BASE64 }}
      run: |
        mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
        echo "$PROFILE_BASE64" | base64 --decode \
          > ~/Library/MobileDevice/Provisioning\ Profiles/SmartSpeed.mobileprovision

    # ── 7. Build the app ──────────────────────────────────────────
    - name: Build app
      run: |
        xcodebuild \
          -project SmartSpeedCompanion.xcodeproj \
          -scheme SmartSpeedCompanion \
          -configuration Release \
          -destination "generic/platform=iOS" \
          -archivePath ./SmartSpeedCompanion.xcarchive \
          DEVELOPMENT_TEAM="${{ secrets.APPLE_TEAM_ID }}" \
          CODE_SIGN_IDENTITY="Apple Development" \
          PROVISIONING_PROFILE_SPECIFIER="SmartSpeed" \
          clean archive

    # ── 8. Export the signed IPA ──────────────────────────────────
    - name: Export IPA
      run: |
        cat > ExportOptions.plist << EOF
        <?xml version="1.0" encoding="UTF-8"?>
        <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
        <plist version="1.0">
        <dict>
          <key>method</key>
          <string>development</string>
          <key>teamID</key>
          <string>${{ secrets.APPLE_TEAM_ID }}</string>
          <key>signingStyle</key>
          <string>manual</string>
          <key>provisioningProfiles</key>
          <dict>
            <key>com.smartspeedcompanion.app</key>
            <string>SmartSpeed</string>
          </dict>
          <key>stripSwiftSymbols</key>
          <true/>
        </dict>
        </plist>
        EOF

        xcodebuild -exportArchive \
          -archivePath ./SmartSpeedCompanion.xcarchive \
          -exportOptionsPlist ExportOptions.plist \
          -exportPath ./output

    # ── 9. Upload the IPA so you can download it ──────────────────
    - name: Upload IPA artifact
      uses: actions/upload-artifact@v4
      with:
        name: SmartSpeedCompanion-${{ github.run_number }}
        path: ./output/*.ipa
        retention-days: 7    # keeps the file for 7 days (your Saturday window)

    # ── 10. Clean up keychain (security hygiene) ──────────────────
    - name: Clean up keychain
      if: always()
      run: security delete-keychain build.keychain
