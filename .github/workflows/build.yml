name: Build SmartSpeedCompanion (App Store)

on:
  push:
    branches: [ version2 ]
  workflow_dispatch:

jobs:
  build:
    name: Build App Store IPA
    runs-on: macos-14
    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Find and select latest Xcode
        run: |
          echo "Available Xcode versions:"
          ls /Applications | grep Xcode
          XCODE_PATH=$(ls -d /Applications/Xcode_*.app 2>/dev/null | sort -V | tail -1)
          echo "Selecting: $XCODE_PATH"
          sudo xcode-select -s "$XCODE_PATH/Contents/Developer"
          xcodebuild -version

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Verify project exists
        run: ls -la *.xcodeproj

      - name: Install Fastlane
        run: |
          sudo gem install fastlane -NV

      - name: Create Fastlane directory
        run: mkdir -p fastlane

      - name: Create Fastfile
        run: |
          cat > fastlane/Fastfile << 'EOF'
          default_platform(:ios)

          platform :ios do
            desc "Build and upload to App Store"
            lane :release do
              setup_ci
              
              match(
                type: "appstore",
                readonly: true,
                app_identifier: "com.speedsense.app",
                team_id: "VCNBBG32P6",
                skip_provisioning_certs: false,
                skip_certificate_matching: false,
                force_for_new_devices: false,
                verbose: true
              )

              build_app(
                project: "SmartSpeedCompanion.xcodeproj",
                scheme: "SmartSpeedCompanion",
                configuration: "Release",
                destination: "generic/platform=iOS",
                archive_path: "SmartSpeedCompanion.xcarchive",
                export_method: "app-store",
                skip_package_ipa: false,
                skip_package_pkg: true,
                output_directory: "Export",
                output_name: "SmartSpeedCompanion.ipa",
                derived_data_path: "build",
                destination_generic_platform_destination: true,
                build_for_testing: false
              )

              upload_to_app_store(
                app_identifier: "com.speedsense.app",
                team_id: "VCNBBG32P6",
                ipa: "Export/SmartSpeedCompanion.ipa",
                skip_screenshots: true,
                skip_metadata: true,
                skip_app_version_update: true,
                force: false,
                username: ENV["APPSTORE_CONNECT_USERNAME"],
                password: ENV["APPSTORE_CONNECT_PASSWORD"]
              )
            end
          end
          EOF

      - name: Build and Upload to App Store
        env:
          APPSTORE_CONNECT_USERNAME: ${{ secrets.APPSTORE_CONNECT_USERNAME }}
          APPSTORE_CONNECT_PASSWORD: ${{ secrets.APPSTORE_CONNECT_PASSWORD }}
          FASTLANE_USER: ${{ secrets.APPSTORE_CONNECT_USERNAME }}
          FASTLANE_PASSWORD: ${{ secrets.APPSTORE_CONNECT_PASSWORD }}
          FASTLANE_APPLE_APPLICATION_SPECIFIC_PASSWORD: ${{ secrets.APPSTORE_CONNECT_PASSWORD }}
          CI: true
        run: |
          cd fastlane
          fastlane ios release

      - name: Upload Archive as Artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: SmartSpeedCompanion-Archive-${{ github.run_number }}
          path: |
            SmartSpeedCompanion.xcarchive
            Export/SmartSpeedCompanion.ipa
          retention-days: 7