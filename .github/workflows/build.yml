name: Build SmartSpeedCompanion (Unsigned)

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    name: Build Unsigned IPA
    runs-on: macos-14
    timeout-minutes: 60

    steps:

    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Configure Git Safe Directory
      run: git config --global --add safe.directory /Users/runner/work/SmartSpeedCompanion/SmartSpeedCompanion

    - name: Find and select latest Xcode
      run: |
        echo "Available Xcode versions:"
        ls /Applications | grep Xcode
        XCODE_PATH=$(ls -d /Applications/Xcode_*.app 2>/dev/null | sort -V | tail -1)
        echo "Selecting: $XCODE_PATH"
        sudo xcode-select -s "$XCODE_PATH/Contents/Developer"
        xcodebuild -version

    - name: Install XcodeGen
      run: brew install xcodegen

    - name: Clean generated Xcode project
      run: rm -rf *.xcodeproj

    - name: Clean package cache
      run: rm -rf .build

    - name: Generate Xcode project
      run: xcodegen generate

    - name: Verify project exists
      run: ls -la *.xcodeproj

    - name: Resolve Swift Packages
      run: |
        xcodebuild \
          -resolvePackageDependencies \
          -project SmartSpeedCompanion.xcodeproj \
          -scheme SmartSpeedCompanion \
          -clonedSourcePackagesDirPath .build

    - name: Configure Git Safe Directory
      run: git config --global --add safe.directory /Users/runner/work/SmartSpeedCompanion/SmartSpeedCompanion

    - name: Resolve Package Dependencies
      run: xcodebuild -showBuildSettings -resolvePackageDependencies -project SmartSpeedCompanion.xcodeproj -scheme SmartSpeedCompanion

    - name: Clean package cache
      run: rm -rf .build

    - name: Configure Git Safe Directory
      run: git config --global --add safe.directory /Users/runner/work/SmartSpeedCompanion/SmartSpeedCompanion

    - name: Build and archive app
      run: |
        xcodebuild \
          -project SmartSpeedCompanion.xcodeproj \
          -scheme SmartSpeedCompanion \
          -configuration Release \
          -destination "generic/platform=iOS" \
          -archivePath /tmp/SmartSpeedCompanion.xcarchive \
          -derivedDataPath ./DerivedData \
          -clonedSourcePackagesDirPath .build \
          CODE_SIGNING_ALLOWED=NO \
          CODE_SIGNING_REQUIRED=NO \
          CODE_SIGN_IDENTITY="" \
          archive

    - name: Configure Git Safe Directory
      run: git config --global --add safe.directory /Users/runner/work/SmartSpeedCompanion/SmartSpeedCompanion

    - name: Clean package cache
      run: rm -rf .build

    - name: Package unsigned IPA
      run: |
        mkdir -p ./Payload
        cp -r ./SmartSpeedCompanion.xcarchive/Products/Applications/SmartSpeedCompanion.app ./Payload/
        zip -r SmartSpeedCompanion-unsigned.ipa Payload
        ls -lh SmartSpeedCompanion-unsigned.ipa

    - name: Upload unsigned IPA
      uses: actions/upload-artifact@v4
      with:
        name: SmartSpeedCompanion-unsigned-${{ github.run_number }}
        path: SmartSpeedCompanion-unsigned.ipa
        retention-days: 7