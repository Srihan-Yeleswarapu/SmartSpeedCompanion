name: Build SmartSpeedCompanion (Unsigned)

on:
  push:
    branches: [ version2 ]
  workflow_dispatch:

jobs:
  build:
    name: Build Unsigned IPA
    runs-on: macos-14
    timeout-minutes: 60

    steps:

    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Find and select latest Xcode
      run: |
        echo "Available Xcode versions:"
        ls /Applications | grep Xcode
        XCODE_PATH=$(ls -d /Applications/Xcode_*.app 2>/dev/null | sort -V | tail -1)
        echo "Selecting: $XCODE_PATH"
        sudo xcode-select -s "$XCODE_PATH/Contents/Developer"
        xcodebuild -version

    - name: Install XcodeGen
      run: brew install xcodegen

    - name: Generate Xcode project
      run: xcodegen generate

    - name: Verify project exists
      run: ls -la *.xcodeproj

    - name: Build Production app
      run: |
        xcodebuild \
          -project SmartSpeedCompanion.xcodeproj \
          -scheme SmartSpeedCompanion \
          -configuration Release \
          -destination "generic/platform=iOS" \
          -archivePath ./SmartSpeedCompanion.xcarchive \
          CODE_SIGN_IDENTITY="" \
          CODE_SIGNING_REQUIRED=NO \
          CODE_SIGNING_ALLOWED=NO \
          clean archive

    - name: Build Developer app
      run: |
        xcodebuild \
          -project SmartSpeedCompanion.xcodeproj \
          -scheme SmartSpeedCompanion \
          -configuration Release \
          -destination "generic/platform=iOS" \
          -archivePath ./SmartSpeedCompanion-Developer.xcarchive \
          CODE_SIGN_IDENTITY="" \
          CODE_SIGNING_REQUIRED=NO \
          CODE_SIGNING_ALLOWED=NO \
          OTHER_SWIFT_FLAGS="-D DEVELOPER_BUILD" \
          clean archive

    - name: Package unsigned IPAs
      run: |
        mkdir -p ./Payload
        # Production
        cp -r ./SmartSpeedCompanion.xcarchive/Products/Applications/SmartSpeedCompanion.app ./Payload/
        zip -r SmartSpeedCompanion.ipa Payload
        rm -rf ./Payload/*
        
        # Developer
        cp -r ./SmartSpeedCompanion-Developer.xcarchive/Products/Applications/SmartSpeedCompanion.app ./Payload/
        zip -r SmartSpeedCompanion-Developer.ipa Payload
        
        ls -lh *.ipa

    - name: Upload IPAs
      uses: actions/upload-artifact@v4
      with:
        name: SmartSpeedCompanion-Builds-${{ github.run_number }}
        path: |
          SmartSpeedCompanion.ipa
          SmartSpeedCompanion-Developer.ipa
        retention-days: 7