name: Build SmartSpeedCompanion (App Store)

on:
  push:
    branches: [ version2 ]
  workflow_dispatch:

jobs:
  build:
    name: Build App Store IPA
    runs-on: macos-14
    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Find and select latest Xcode
        run: |
          echo "Available Xcode versions:"
          ls /Applications | grep Xcode
          XCODE_PATH=$(ls -d /Applications/Xcode_*.app 2>/dev/null | sort -V | tail -1)
          echo "Selecting: $XCODE_PATH"
          sudo xcode-select -s "$XCODE_PATH/Contents/Developer"
          xcodebuild -version

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Verify project exists
        run: ls -la *.xcodeproj

      - name: Setup provisioning profile
        run: |
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          echo "${{ secrets.APPSTORE_PROVISIONING_PROFILE_BASE64 }}" | base64 -D -o ~/Library/MobileDevice/Provisioning\ Profiles/SpeedSense.mobileprovision
          ls -la ~/Library/MobileDevice/Provisioning\ Profiles/

      - name: Build App Store Archive (Auto-Signing)
        run: |
          xcodebuild \
            -project SmartSpeedCompanion.xcodeproj \
            -scheme SmartSpeedCompanion \
            -configuration Release \
            -destination "generic/platform=iOS" \
            -archivePath ./SmartSpeedCompanion.xcarchive \
            -allowProvisioningUpdates \
            CODE_SIGN_STYLE=Automatic \
            DEVELOPMENT_TEAM="VCNBBG32P6" \
            clean archive

      - name: Create Export Options Plist
        run: |
          cat > exportOptions.plist << 'EOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>method</key>
              <string>app-store</string>
              <key>signingStyle</key>
              <string>automatic</string>
              <key>stripSwiftSymbols</key>
              <true/>
              <key>teamID</key>
              <string>VCNBBG32P6</string>
          </dict>
          </plist>
          EOF

      - name: Export IPA from Archive
        run: |
          xcodebuild \
            -exportArchive \
            -archivePath ./SmartSpeedCompanion.xcarchive \
            -exportOptionsPlist exportOptions.plist \
            -exportPath ./Export

      - name: Verify IPA was created
        run: ls -lh Export/

      - name: Upload IPA to App Store Connect (xcrun altool)
        run: |
          xcrun altool \
            --upload-app \
            --file "./Export/SmartSpeedCompanion.ipa" \
            --type ios \
            --username "${{ secrets.APPSTORE_CONNECT_USERNAME }}" \
            --password "${{ secrets.APPSTORE_CONNECT_PASSWORD }}" \
            --show-progress

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: SmartSpeedCompanion-Build-${{ github.run_number }}
          path: |
            SmartSpeedCompanion.xcarchive
            Export/SmartSpeedCompanion.ipa
          retention-days: 30