name: Build SmartSpeedCompanion (App Store)

on:
  push:
    branches: [ version2 ]
  workflow_dispatch:

jobs:
  build:
    name: Build App Store Archive
    runs-on: macos-14
    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Find and select latest Xcode
        run: |
          XCODE_PATH=$(ls -d /Applications/Xcode_*.app 2>/dev/null | sort -V | tail -1)
          sudo xcode-select -s "$XCODE_PATH/Contents/Developer"
          xcodebuild -version

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Build App Store Archive
        run: |
          xcodebuild \
            -project SmartSpeedCompanion.xcodeproj \
            -scheme SmartSpeedCompanion \
            -configuration Release \
            -destination "generic/platform=iOS" \
            -archivePath ./SmartSpeedCompanion.xcarchive \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            clean archive

      - name: Upload Archive
        uses: actions/upload-artifact@v4
        with:
          name: SmartSpeedCompanion-Archive-${{ github.run_number }}
          path: SmartSpeedCompanion.xcarchive
          retention-days: 30