name: Build SmartSpeedCompanion (App Store)

on:
  push:
    branches: [ version2 ]
  workflow_dispatch:

jobs:
  build:
    name: Build and Release App Store IPA
    runs-on: macos-14
    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Find and select latest Xcode
        run: |
          echo "Selecting Xcode 16.0 or latest..."
          XCODE_PATH=$(ls -d /Applications/Xcode_16*.app 2>/dev/null | sort -V | tail -1)
          if [ -z "$XCODE_PATH" ]; then
            XCODE_PATH=$(ls -d /Applications/Xcode_*.app 2>/dev/null | sort -V | tail -1)
          fi
          echo "Selected: $XCODE_PATH"
          sudo xcode-select -s "$XCODE_PATH/Contents/Developer"
          xcodebuild -version

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Create Provisioning Profiles directory
        run: mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles

      - name: Setup Apple Certificate and Provisioning Profile
        env:
          P12_BASE64: ${{ secrets.APPSTORE_CERTIFICATE_P12_BASE64 }}
          P12_PASSWORD: ${{ secrets.APPSTORE_CERTIFICATE_PASSWORD }}
          PP_BASE64: ${{ secrets.APPSTORE_PROVISIONING_PROFILE_BASE64 }}
          KEYCHAIN_PASSWORD: "build_keychain_pass"
        run: |
          CERT_PATH=$RUNNER_TEMP/build_certificate.p12
          PP_PATH=~/Library/MobileDevice/Provisioning\ Profiles/SpeedSense.mobileprovision
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db

          # 1. Import Cert & Profile from Secrets
          echo -n "$P12_BASE64" | base64 -D -o "$CERT_PATH"
          echo -n "$PP_BASE64" | base64 -D -o "$PP_PATH"

          # 2. Setup Keychain
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          # 3. Import P12 into Keychain
          # -A: allow all applications (like codesign) to use this keychain without user interaction prompt
          # -T /usr/bin/codesign: grant access to codesign binary explicitly
          security import "$CERT_PATH" -P "$P12_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security list-keychain -d user -s "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          # Verify it's there
          security find-identity -v -p codesigning "$KEYCHAIN_PATH"

      - name: Generate Xcode project (XcodeGen)
        run: xcodegen generate

      - name: Build App Store Archive
        run: |
          xcodebuild \
            -project SmartSpeedCompanion.xcodeproj \
            -scheme SmartSpeedCompanion \
            -configuration Release \
            -destination "generic/platform=iOS" \
            -archivePath ./SmartSpeedCompanion.xcarchive \
            clean archive

      - name: Create Export Options Plist
        run: |
          cat > exportOptions.plist << 'EOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>method</key>
              <string>app-store</string>
              <key>signingStyle</key>
              <string>manual</string>
              <key>provisioningProfileSpecifier</key>
              <string>SpeedSense App Store</string>
              <key>stripSwiftSymbols</key>
              <true/>
              <key>teamID</key>
              <string>VCNBBG32P6</string>
              <key>uploadSymbols</key>
              <true/>
          </dict>
          </plist>
          EOF

      - name: Export IPA
        run: |
          xcodebuild \
            -exportArchive \
            -archivePath ./SmartSpeedCompanion.xcarchive \
            -exportOptionsPlist exportOptions.plist \
            -exportPath ./Export

      - name: Upload to App Store Connect
        run: |
          xcrun altool \
            --upload-app \
            --file "./Export/SmartSpeedCompanion.ipa" \
            --type ios \
            --username "${{ secrets.APPSTORE_CONNECT_USERNAME }}" \
            --password "${{ secrets.APPSTORE_CONNECT_PASSWORD }}" \
            --show-progress

      - name: Upload Artifacts (Fail-safe)
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: SmartSpeedCompanion-Artifacts-${{ github.run_number }}
          path: |
            Export/*.ipa
            SmartSpeedCompanion.xcarchive
          retention-days: 14