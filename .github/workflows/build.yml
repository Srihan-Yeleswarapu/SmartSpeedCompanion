name: Build SmartSpeedCompanion (App Store)

on:
  push:
    branches: [ version2 ]
  workflow_dispatch:

jobs:
  build:
    name: Build App Store IPA
    runs-on: macos-14
    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Find and select latest Xcode
        run: |
          echo "Available Xcode versions:"
          ls /Applications | grep Xcode
          XCODE_PATH=$(ls -d /Applications/Xcode_*.app 2>/dev/null | sort -V | tail -1)
          echo "Selecting: $XCODE_PATH"
          sudo xcode-select -s "$XCODE_PATH/Contents/Developer"
          xcodebuild -version

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Create Provisioning Profiles directory
        run: mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles

      - name: Setup Apple Certificate and Provisioning Profile
        env:
          P12_BASE64: ${{ secrets.APPSTORE_CERTIFICATE_P12_BASE64 }}
          P12_PASSWORD: ${{ secrets.APPSTORE_CERTIFICATE_PASSWORD }}
          PP_BASE64: ${{ secrets.APPSTORE_PROVISIONING_PROFILE_BASE64 }}
          KEYCHAIN_PASSWORD: "build_keychain_pass"
        run: |
          CERT_PATH=$RUNNER_TEMP/build_certificate.p12
          PP_PATH=~/Library/MobileDevice/Provisioning\ Profiles/SpeedSense.mobileprovision
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db

          # 1. Decode & Install cert/profile
          echo -n "$P12_BASE64" | base64 -D -o "$CERT_PATH"
          echo -n "$PP_BASE64" | base64 -D -o "$PP_PATH"

          # 2. Configure Keychain
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          # 3. Import P12 and Grant Access
          security import "$CERT_PATH" -P "$P12_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security list-keychain -d user -s "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          # Verify identity
          security find-identity -v -p codesigning "$KEYCHAIN_PATH"

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Build App Store Archive
        run: |
          xcodebuild \
            -project SmartSpeedCompanion.xcodeproj \
            -scheme SmartSpeedCompanion \
            -configuration Release \
            -destination "generic/platform=iOS" \
            -archivePath ./SmartSpeedCompanion.xcarchive \
            -allowProvisioningUpdates \
            DEVELOPMENT_TEAM="VCNBBG32P6" \
            CODE_SIGN_STYLE=Manual \
            clean archive

      - name: Create Export Options Plist
        run: |
          cat > exportOptions.plist << 'EOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>method</key>
              <string>app-store</string>
              <key>signingStyle</key>
              <string>manual</string>
              <key>provisioningProfileSpecifier</key>
              <string>SpeedSense_App_Store</string>
              <key>stripSwiftSymbols</key>
              <true/>
              <key>teamID</key>
              <string>VCNBBG32P6</string>
              <key>uploadSymbols</key>
              <true/>
          </dict>
          </plist>
          EOF

      - name: Export IPA from Archive
        run: |
          xcodebuild \
            -exportArchive \
            -archivePath ./SmartSpeedCompanion.xcarchive \
            -exportOptionsPlist exportOptions.plist \
            -exportPath ./Export

      - name: Verify IPA was created
        run: |
          if [ -f "Export/SmartSpeedCompanion.ipa" ]; then
            echo "✅ IPA created successfully"
            ls -lh Export/SmartSpeedCompanion.ipa
          else
            echo "❌ IPA creation failed"
            exit 1
          fi

      - name: Upload IPA to App Store Connect
        run: |
          xcrun altool \
            --upload-app \
            --file "./Export/SmartSpeedCompanion.ipa" \
            --type ios \
            --username "${{ secrets.APPSTORE_CONNECT_USERNAME }}" \
            --password "${{ secrets.APPSTORE_CONNECT_PASSWORD }}" \
            --show-progress

      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: SmartSpeedCompanion-Build-${{ github.run_number }}
          path: |
            SmartSpeedCompanion.xcarchive
            Export/SmartSpeedCompanion.ipa
          retention-days: 30