name: Build SmartSpeedCompanion (App Store)

on:
  push:
    branches: [ version2 ]
  workflow_dispatch:

jobs:
  build:
    name: Build App Store IPA
    runs-on: macos-14
    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Find and select latest Xcode
        run: |
          XCODE_PATH=$(ls -d /Applications/Xcode_*.app 2>/dev/null | sort -V | tail -1)
          sudo xcode-select -s "$XCODE_PATH/Contents/Developer"
          xcodebuild -version

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Setup provisioning profile
        run: |
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          cp .github/certs/SpeedSense_App_Store.mobileprovision ~/Library/MobileDevice/Provisioning\ Profiles/
          ls -la ~/Library/MobileDevice/Provisioning\ Profiles/

      - name: Setup signing certificate
        env:
          P12_PASSWORD: ${{ secrets.APPSTORE_CERTIFICATE_PASSWORD }}
        run: |
          CERT_PATH=.github/certs/Apple_Distribution_NEW.p12
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
          KEYCHAIN_PASSWORD="temp"
          
          # Create keychain
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          
          # Import certificate
          security import "$CERT_PATH" -P "$P12_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security list-keychain -d user -s "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          
          # Verify
          security find-identity -v -p codesigning "$KEYCHAIN_PATH"

      - name: Build App Store Archive
        run: |
          xcodebuild \
            -project SmartSpeedCompanion.xcodeproj \
            -scheme SmartSpeedCompanion \
            -configuration Release \
            -destination "generic/platform=iOS" \
            -archivePath ./SmartSpeedCompanion.xcarchive \
            CODE_SIGN_STYLE=Manual \
            PROVISIONING_PROFILE_SPECIFIER="SpeedSense_App_Store" \
            DEVELOPMENT_TEAM="VCNBBG32P6" \
            clean archive

      - name: Create Export Options
        run: |
          cat > exportOptions.plist << 'EOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>method</key>
              <string>app-store</string>
              <key>signingStyle</key>
              <string>manual</string>
              <key>provisioningProfileSpecifier</key>
              <string>SpeedSense_App_Store</string>
              <key>stripSwiftSymbols</key>
              <true/>
              <key>teamID</key>
              <string>VCNBBG32P6</string>
          </dict>
          </plist>
          EOF

      - name: Export IPA
        run: |
          xcodebuild \
            -exportArchive \
            -archivePath ./SmartSpeedCompanion.xcarchive \
            -exportOptionsPlist exportOptions.plist \
            -exportPath ./Export

      - name: Upload to App Store
        run: |
          xcrun altool \
            --upload-app \
            --file "./Export/SmartSpeedCompanion.ipa" \
            --type ios \
            --username "${{ secrets.APPSTORE_CONNECT_USERNAME }}" \
            --password "${{ secrets.APPSTORE_CONNECT_PASSWORD }}" \
            --show-progress

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: SmartSpeedCompanion-Build-${{ github.run_number }}
          path: |
            SmartSpeedCompanion.xcarchive
            Export/SmartSpeedCompanion.ipa
          retention-days: 30